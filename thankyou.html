  <style>
    /* CSS RESET & VARIABLES */
    :root {
      --primary: #059669;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text: #0F172A;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--text); background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }

    .check-icon { width: 80px; height: 80px; background: #D1FAE5; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 2.5rem; }
    
    h1 { font-size: 2rem; margin-bottom: 1rem; color: var(--text); }
    p { color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }
    
    .btn { display: inline-block; padding: 1rem 2rem; border-radius: 6px; font-weight: 500; cursor: pointer; transition: 0.3s; width: 100%; border: none; font-size: 1rem; }
    .btn-whatsapp { background: #25D366; color: #fff; margin-bottom: 1rem; }
    .btn-whatsapp:hover { background: #1EBE5C; }
    .btn-home { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-home:hover { border-color: var(--primary); color: var(--primary); }

  </style>
